jobs:
  eslint:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v7'
      - name: 'Yarn cache'
        uses: 'actions/cache@v6.1.0'
        with:
          key: "${{ runner.os }}-yarn-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}"
          path: '~/.yarn/berry'
          restore-keys: '${{ runner.os }}-yarn'
      - name: 'Install dependencies (Yarn)'
        run: 'yarn'
      - name: 'ESLint'
        run: 'yarn eslint'
name: 'QA'
'on':
  pull_request:
    branches:
      - 'master'
    paths:
      - '**/*.cjs'
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.mjs'
      - '**/*.ts'
      - '**/*.tsx'
      - '.github/workflows/qa.yml'
      - 'package.json'
      - 'tsconfig.json'
  push:
    branches:
      - 'master'
    paths:
      - '**/*.cjs'
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.mjs'
      - '**/*.ts'
      - '**/*.tsx'
      - '.github/workflows/qa.yml'
      - 'package.json'
      - 'tsconfig.json'
permissions:
  contents: 'read'
